spring.application.name=Survey
# ===============================
# = MySQL Database Configuration
# ===============================

# JDBC URL (change db_name to your database name)
spring.datasource.url=jdbc:mysql://localhost:3306/db_name?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# Database credentials
spring.datasource.username=root
spring.datasource.password=Ajith

# JDBC driver (Optional - Spring Boot detects automatically)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# = JPA / Hibernate Configuration
# ===============================

# Automatically update the database schema (other options: none, validate, create, create-drop)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
spring.jpa.show-sql=true

# Format SQL output for better readability
spring.jpa.properties.hibernate.format_sql=true

# Dialect (MySQL 8.x)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
